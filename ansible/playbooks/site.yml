---
- name: Verify Cisco Routers
  hosts: cisco_routers
  gather_facts: no
  tasks:
    - name: Get version
      cisco.ios.ios_command:
        commands: show version | include IOS
      register: result

    - name: Show result
      debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout[0] }}"

- name: Verify Cisco Switches
  hosts: cisco_switches
  gather_facts: no
  tasks:
    - name: Get version
      cisco.ios.ios_command:
        commands: show version | include IOS
      register: result

    - name: Show result
      debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout[0] }}"