---
- name: Verify Cisco Routers
  hosts: device_roles_core-router
  gather_facts: false
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios
    ansible_ssh_common_args: '-o KexAlgorithms=diffie-hellman-group14-sha1 -o StrictHostKeyChecking=no'
    ansible_network_cli_ssh_type: paramiko
  tasks:
    - name: Get version
      cisco.ios.ios_command:
        commands:
          - show version | include IOS
      register: result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout_lines[0][0] }}"

- name: Verify Cisco Switches
  hosts: device_roles_distribution-switch:device_roles_access-switch:device_roles_dmz-switch
  gather_facts: false
  connection: network_cli
  vars:
    ansible_network_os: cisco.ios.ios
    ansible_ssh_common_args: '-o KexAlgorithms=diffie-hellman-group14-sha1 -o StrictHostKeyChecking=no'
    ansible_network_cli_ssh_type: paramiko
  tasks:
    - name: Get version
      cisco.ios.ios_command:
        commands:
          - show version | include IOS
      register: result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout_lines[0][0] }}"

- name: Verify Juniper Edge Router
  hosts: device_roles_edge-pe
  gather_facts: false
  connection: network_cli
  vars:
    ansible_network_os: junipernetworks.junos.junos
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Get version
      junipernetworks.junos.junos_command:
        commands:
          - show version | match Junos
      register: result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout_lines[0][0] }}"

- name: Verify pfSense Firewall
  hosts: device_roles_edge-firewall
  gather_facts: false
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Get version
      ansible.builtin.command: pfSsh.php playback pfSense_version
      register: result
      changed_when: false

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout }}"

- name: Verify MikroTik Router
  hosts: device_roles_branch-router
  gather_facts: false
  connection: network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Get version
      community.routeros.command:
        commands:
          - /system resource print
      register: result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ result.stdout_lines[0] }}"