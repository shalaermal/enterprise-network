---
- name: Verify Cisco Routers connectivity
  hosts: cisco_routers
  gather_facts: no
  tasks:
    - name: Ping test
      cisco.ios.ios_ping:
        dest: 127.0.0.1
      register: ping_result

    - name: Show result
      debug:
        msg: "{{ inventory_hostname }} is reachable"

- name: Verify Cisco Switches connectivity
  hosts: cisco_switches
  gather_facts: no
  tasks:
    - name: Ping test
      cisco.ios.ios_ping:
        dest: 127.0.0.1
      register: ping_result

    - name: Show result
      debug:
        msg: "{{ inventory_hostname }} is reachable"