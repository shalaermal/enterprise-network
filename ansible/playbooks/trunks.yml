---

- name: Configure L2 trunk/access interfaces from NetBox
  hosts: device_roles_core-router:device_roles_distribution-switch:device_roles_access-switch:device_roles_dmz-switch
  gather_facts: false
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    # Cisco vIOS in this lab only supports the older diffie-hellman-group14-sha1
    # KEX algorithm, which was removed from paramiko 3.x - hence the pinned
    # KexAlgorithms option and the older paramiko version baked into the EE.
    ansible_ssh_common_args: '-o KexAlgorithms=diffie-hellman-group14-sha1 -o StrictHostKeyChecking=no'
    ansible_network_cli_ssh_type: paramiko

  roles:
    - trunks
