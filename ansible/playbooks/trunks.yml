---
# =============================================================================
# Playbook: Configure Trunks
# Purpose : Apply Layer 2 trunk (and access) port configuration to Cisco IOS
#           switches/routers, driven entirely by interface data stored in
#           NetBox (source of truth).
#
# Scope   : Targets any device that participates in the switched topology:
#           - Distribution switches (HQ-DSW-01 / HQ-DSW-02)
#           - Access switches      (HQ-ASW-01 / HQ-ASW-02)
#           - DMZ switch           (HQ-DMZ-SW01)
#           - Core routers         (HQ-CR-01 / HQ-CR-02) - their downlink
#             interfaces toward the distribution layer also need 802.1Q
#             trunk configuration, even though the device role is "router".
#
# Design  : This playbook does NOT hardcode which interfaces are trunks,
#           which VLANs are allowed, or which ports are access ports.
#           All of that lives in NetBox (Device > Interfaces > 802.1Q Mode /
#           Tagged VLANs / Untagged VLAN). The role below reads that data at
#           runtime via the netbox.netbox.nb_lookup plugin and converts it
#           into the data structure expected by cisco.ios.ios_l2_interfaces.
#
#           This mirrors the same pattern already proven with vlans.yml:
#           change the intent in NetBox -> re-run the job -> device converges.
#           No code change required for day-to-day topology changes.
#
# Real-world note:
#           In a production NOC, this is typically how "intended state"
#           network automation works - NetBox (or another IPAM/DCIM/Source
#           of Truth tool) holds the design, and a config management tool
#           (Ansible/AWX here) renders and pushes that design to devices on
#           demand or on a schedule. Engineers change the *intent* in the
#           Source of Truth; the pipeline takes care of the *delivery*.
# =============================================================================

- name: Configure L2 trunk/access interfaces from NetBox
  hosts: device_roles_core-router:device_roles_distribution-switch:device_roles_access-switch:device_roles_dmz-switch
  gather_facts: false
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    # Cisco vIOS in this lab only supports the older diffie-hellman-group14-sha1
    # KEX algorithm, which was removed from paramiko 3.x - hence the pinned
    # KexAlgorithms option and the older paramiko version baked into the EE.
    ansible_ssh_common_args: '-o KexAlgorithms=diffie-hellman-group14-sha1 -o StrictHostKeyChecking=no'
    ansible_network_cli_ssh_type: paramiko

  roles:
    - trunks
